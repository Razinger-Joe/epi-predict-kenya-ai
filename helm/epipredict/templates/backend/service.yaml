{{/*
Backend Service — ClusterIP (internal, accessed via Ingress).
WHY: The backend is accessed through the Ingress controller at /api/ path.
It no longer needs to be exposed directly — the Ingress handles routing.
*/}}
{{- if .Values.backend.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "epipredict.fullname" . }}-backend
  namespace: {{ include "epipredict.namespace" . }}
  labels:
    {{- include "epipredict.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  type: {{ .Values.backend.service.type }}
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: {{ .Values.backend.port }}
      protocol: TCP
      name: http
  selector:
    {{- include "epipredict.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: backend
{{- end }}
