{{/*
Backend HPA — Horizontal Pod Autoscaler.
WHY: The backend handles ALL user requests. During peak usage (e.g., multiple
counties reporting data, mass chatbot queries, dashboard refreshes),
the backend needs to scale up. HPA watches CPU and memory usage and
automatically adds pods when thresholds are exceeded.
*/}}
{{- if and .Values.backend.enabled .Values.backend.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "epipredict.fullname" . }}-backend-hpa
  namespace: {{ include "epipredict.namespace" . }}
  labels:
    {{- include "epipredict.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "epipredict.fullname" . }}-backend
  minReplicas: {{ .Values.backend.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.backend.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.backend.autoscaling.targetCPUUtilization }}
    {{- if .Values.backend.autoscaling.targetMemoryUtilization }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.backend.autoscaling.targetMemoryUtilization }}
    {{- end }}
  behavior:
    # Scale UP quickly (respond to load within 30 seconds)
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    # Scale DOWN slowly (wait 2 minutes before removing pods to avoid flapping)
    scaleDown:
      stabilizationWindowSeconds: 120
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
{{- end }}
