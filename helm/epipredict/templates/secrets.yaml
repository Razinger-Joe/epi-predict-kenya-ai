{{/*
Kubernetes Secrets — stores sensitive data like database credentials.
WHY: Never hardcode passwords in YAML files. Secrets are base64 encoded
and can be referenced securely from Deployments via secretKeyRef.
Think of it like keeping your M-Pesa PIN in a vault instead of a sticky note.
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "epipredict.secretName" . }}
  namespace: {{ include "epipredict.namespace" . }}
  labels:
    {{- include "epipredict.labels" . | nindent 4 }}
type: Opaque
data:
  # Base64 encoded values (Helm encodes them automatically)
  POSTGRES_USER: {{ .Values.secrets.database.user | b64enc | quote }}
  POSTGRES_PASSWORD: {{ .Values.secrets.database.password | b64enc | quote }}
  POSTGRES_DB: {{ .Values.secrets.database.name | b64enc | quote }}
  DATABASE_URL: {{ include "epipredict.databaseUrl" . | b64enc | quote }}
