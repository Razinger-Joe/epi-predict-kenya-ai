# ═══════════════════════════════════════════════════════════════════════════════
# Docker Compose - EpiPredict Kenya AI Multi-service Stack
# ═══════════════════════════════════════════════════════════════════════════════

version: '3.8'

services:
  # 1. Database Tier (PostgreSQL)
  database-service:
    image: postgres:15-alpine
    container_name: epipredict-database
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=epipredict
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d epipredict"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - epipredict-network

  # 2. Standalone Machine Learning Tier (FastAPI)
  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: epipredict-ml-service
    ports:
      - "5000:5000"
    volumes:
      - ml_models:/app/models
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - epipredict-network

  # 3. Backend Gateway Tier (FastAPI Gateway)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: epipredict-backend
    ports:
      - "8000:8000"
    depends_on:
      database-service:
        condition: service_healthy
      ml-service:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@database-service:5432/epipredict
      - ML_SERVICE_URL=http://ml-service:5000
      - ENVIRONMENT=production
      - PORT=8000
      - ALLOWED_ORIGINS=http://localhost,http://frontend,http://localhost:5173
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - epipredict-network

  # 4. Frontend Client Tier (React + Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: epipredict-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - epipredict-network

networks:
  epipredict-network:
    driver: bridge
    name: epipredict-network

volumes:
  postgres_data:
    name: epipredict-postgres-data
  ml_models:
    name: epipredict-ml-models
